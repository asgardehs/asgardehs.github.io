---
layout: default
---
<article class="page-article">
  {%- if page.title and page.hide_title != true -%}
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    {%- if page.description %}<p class="page-lede">{{ page.description }}</p>{% endif -%}
  </header>
  {%- endif -%}
  <div class="page-body">
    {{ content }}
  </div>
</article>
